# ── Jeton de Casino ───────────────────────────────────────────────────────────
token:
  material: GOLD_NUGGET
  name: "&6✦ Jeton de Casino ✦"
  lore:
    - "&7Cliquez sur un bloc de casino"
    - "&7pour tenter votre chance !"
  custom-model-data: 0   # 0 = désactivé

# ── Bloc de Casino ────────────────────────────────────────────────────────────
casino-block:
  hologram:
    text: "&6&l✦ CASINO ✦"
    offset-y: 1.5          # Hauteur au-dessus du bloc (en blocs)

# ── Interface graphique ───────────────────────────────────────────────────────
gui:
  title: "&8&l[ &6&lCASINO &8&l]"
  border-material: PURPLE_STAINED_GLASS_PANE
  border-name: " "
  prizes-title: "&8&l[ &6&lLOTS DISPONIBLES &8&l]"

# ── Roulette ─────────────────────────────────────────────────────────────────
roulette:
  total-steps: 40        # Nombre total de défilements de la roulette
  slow-down: false        # Si vrai : accélère au milieu puis ralentit à la fin
                         # Si faux : accélère progressivement jusqu'à la fin
  max-delay: 8           # Délai max en ticks entre chaque défilement (plus lent)
  min-delay: 1           # Délai min en ticks entre chaque défilement (plus rapide)
  sound: BLOCK_NOTE_BLOCK_PLING
  sound-volume: 0.7
  sound-pitch-min: 0.5   # Tonalité au début de l'animation
  sound-pitch-max: 2.0   # Tonalité à la fin de l'animation
  finish-sound: ENTITY_PLAYER_LEVELUP

# ── Messages ──────────────────────────────────────────────────────────────────
messages:
  no-permission:           "&cVous n'avez pas la permission."
  player-only:             "&cCette commande est réservée aux joueurs."
  no-target-block:         "&cRegardez un bloc (portée max : 8 blocs)."
  not-casino-block:        "&cCe bloc n'est pas un bloc de casino."
  animation-in-progress:   "&cUne animation de casino est déjà en cours !"
  need-token:              "&6✦ &eIl vous faut &6{token} &epour jouer !"
  block-set:               "&a✦ Bloc de casino enregistré en &f{x}, {y}, {z}&a !"
  block-removed:           "&a✦ Bloc de casino supprimé."
  give-success:            "&a✦ {amount} jeton(s) donné(s) à &f{player}&a."
  give-received:           "&6✦ Vous avez reçu &e{amount} &6jeton(s) de casino !"
  give-no-player:          "&cSpécifiez un joueur : /casino give <joueur> [quantité]"
  player-not-found:        "&cJoueur introuvable : &f{player}"
  invalid-amount:          "&cQuantité invalide, utilisation de 1."
  reload-success:          "&a✦ Configuration du casino rechargée avec succès."
  settoken-success:        "&a✦ Jeton de casino personnalisé avec l'item en main !"
  settoken-reset:          "&a✦ Jeton de casino réinitialisé aux valeurs de la config."
  settoken-no-item:        "&cVous devez tenir un item dans la main !"
  win-title:               "&6✦ GAGNÉ ! ✦"

# ── Lots ──────────────────────────────────────────────────────────────────────
# chance : poids relatif du lot (plus c'est élevé, plus c'est fréquent)
# console-command : commande exécutée par la console (%player% = nom du joueur)
# broadcast-message : message envoyé à tous les joueurs (vide = désactivé)
# player-message : message envoyé au joueur gagnant (vide = désactivé)
prizes:
  diamant:
    display-material: DIAMOND
    display-name: "&bDiamant"
    display-lore:
      - "&75% de chance"
    chance: 5
    console-command: "give %player% diamond 1"
    broadcast-message: "&e✦ %player% &aa remporté &b&lun Diamant&a au casino !"
    player-message: "&a✦ Félicitations ! Vous avez gagné &b&lun Diamant&a !"

  emeraude:
    display-material: EMERALD
    display-name: "&eÉmeraude"
    display-lore:
      - "&710% de chance"
    chance: 10
    console-command: "give %player% emerald 1"
    broadcast-message: ""
    player-message: "&a✦ Vous avez gagné &a&lune Émeraude&a !"

  or:
    display-material: GOLD_INGOT
    display-name: "&eLingot d'Or"
    display-lore:
      - "&720% de chance"
    chance: 20
    console-command: "give %player% gold_ingot 1"
    broadcast-message: ""
    player-message: "&e✦ Vous avez gagné &e&lun Lingot d'Or&e !"

  charbon:
    display-material: COAL
    display-name: "&8Charbon"
    display-lore:
      - "&765% de chance"
    chance: 65
    console-command: "give %player% coal 1"
    broadcast-message: ""
    player-message: "&7Vous avez gagné du charbon... Pas de chance !"





