# ════════════════════════════════════════════════════════════════
#                  Armesia-Level — Configuration
# ════════════════════════════════════════════════════════════════

# ── Paramètres généraux ──────────────────────────────────────────
settings:
  max-level: 100
  # XP nécessaire pour passer du niveau N au niveau N+1 = N × xp-formula-multiplier
  xp-formula-multiplier: 1000

# ── Affichage à chaque montée de niveau ──────────────────────────
# Placeholders disponibles : %level%
level-up:
  message: "&bLevel up ! &7Niveau %level%"
  title:
    main: "&6&l⬆ LEVEL UP ⬆"
    sub: "&eNiveau &6%level%"
    fade-in: 10
    stay: 60
    fade-out: 20
  sound:
    id: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.5

# ── Paliers spéciaux ─────────────────────────────────────────────
# Actions déclenchées quand un joueur ATTEINT exactement ce niveau.
#
# Types d'actions disponibles :
#   message   → message privé au joueur            (placeholders : %player% %level%)
#   broadcast → message global à tous les joueurs  (placeholders : %player% %level%)
#   title     → titre personnalisé au joueur        (placeholders : %player% %level%)
#   sound     → son joué au joueur
#   command   → commande exécutée par la console   (placeholders : %player% %level%)
#
milestones:

  5:
    - type: broadcast
      value: "&6[Niveau] &e%player% &7vient d'atteindre le &6niveau 5&7 ! Félicitations !"
    - type: title
      value: "&a&l✦ PALIER 5 ✦"
      subtitle: "&7Bien démarré, continue comme ça !"
      fade-in: 10
      stay: 80
      fade-out: 20
    - type: sound
      id: UI_TOAST_CHALLENGE_COMPLETE
      volume: 1.0
      pitch: 1.0
    - type: command
      value: "give %player% minecraft:iron_sword 1"

  10:
    - type: broadcast
      value: "&6[Niveau] &e%player% &7vient d'atteindre le &6niveau 10&7 ! Impressionnant !"
    - type: title
      value: "&6&l✦ PALIER 10 ✦"
      subtitle: "&7Tu commences à devenir sérieux !"
      fade-in: 10
      stay: 80
      fade-out: 20
    - type: sound
      id: UI_TOAST_CHALLENGE_COMPLETE
      volume: 1.0
      pitch: 1.2
    - type: command
      value: "give %player% minecraft:diamond_sword 1"
    - type: message
      value: "&aTu as débloqué une récompense spéciale au niveau 10 !"

  100:
    - type: broadcast
      value: "&c&l[LÉGENDE] &e%player% &7a atteint le &c&lNIVEAU MAX 100&7 ! INCROYABLE !"
    - type: title
      value: "&c&l★ NIVEAU MAXIMUM ★"
      subtitle: "&7Tu as atteint la légende absolue !"
      fade-in: 10
      stay: 120
      fade-out: 30
    - type: sound
      id: UI_TOAST_CHALLENGE_COMPLETE
      volume: 1.0
      pitch: 0.8
    - type: command
      value: "give %player% minecraft:netherite_sword 1"
    - type: message
      value: "&6&lFélicitations ! Tu as atteint le niveau maximum ! Tu es une légende !"

